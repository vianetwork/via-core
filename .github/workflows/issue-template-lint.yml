name: Issue template lint

on:
  pull_request:
    paths:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/scripts/validate_issue_templates.py"
      - ".github/workflows/issue-template-lint.yml"
      - "AGENTS.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  issue-template-lint:
    name: Validate issue templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install YAML parser
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.2

      - name: Validate issue templates
        run: python .github/scripts/validate_issue_templates.py
